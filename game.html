<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Komputer Grafik: Kelompok 5</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        h2 { margin-bottom: 10px; color: #00fff5; }
        canvas {
            background: #162447;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 2px solid #00fff5;
            border-radius: 4px;
        }
        .info {
            margin-top: 15px;
            font-size: 14px;
            color: #8fa0c4;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Proyek Grafika Komputer: Kelompok 5</h2>
    <h3>Game yang kayak di browser</h3>
    <div style="font-size: 20px; margin-bottom: 10px;">Skor: <span id="scoreUI">0</span></div>
    
    <canvas id="gameCanvas" width="700" height="300"></canvas>
    
    <div class="info">
        Kontrol: Tombol <strong>SPASI</strong> untuk Melompat<br>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreUI = document.getElementById("scoreUI");

        // State Game
        let score = 0;
        let isGameOver = false;
        let gameSpeed = 5;
        let obstacles = [];
        let coins = [];

        // 1. OBJEK KARAKTER (Dibuat bulat melengkung untuk demo Anti-Aliasing)
        const player = {
            x: 80,
            y: 200,
            radius: 20,
            color: "#00fff5",
            gravity: 0.6,
            lift: -12,
            velocity: 0,
            isJumping: false,
            groundY: 200
        };

        // Mengatur Input Keyboard (Spasi)
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                if (!player.isJumping && !isGameOver) {
                    player.velocity = player.lift;
                    player.isJumping = true;
                }
                if (isGameOver) {
                    resetGame();
                }
            }
        });

        function spawnObstacle() {
            if (isGameOver) return;
            // Rintangan berupa tiang/kotak
            obstacles.push({
                x: canvas.width + 20,
                y: 200,
                width: 20,
                height: 40,
                color: "#ff2e63"
            });
            // Atur rentang waktu acak untuk rintangan berikutnya (1.5 - 3 detik)
            setTimeout(spawnObstacle, Math.random() * 1500 + 1500);
        }

        function spawnCoin() {
            if (isGameOver) return;
            // Koin melayang untuk demo Rotasi & Skala
            coins.push({
                x: canvas.width + 20,
                y: Math.random() * 80 + 100,
                radius: 12,
                angle: 0, // Sudut awal rotasi
                color: "#e4bb23"
            });
            setTimeout(spawnCoin, Math.random() * 2000 + 1000);
        }

        // Memulai spawn objek pertama kali
        setTimeout(spawnObstacle, 2000);
        setTimeout(spawnCoin, 1000);

        function resetGame() {
            score = 0;
            isGameOver = false;
            gameSpeed = 5;
            obstacles = [];
            coins = [];
            player.y = player.groundY;
            player.velocity = 0;
            player.isJumping = false;
            scoreUI.innerText = score;
            update();
        }

        // LOOP UTAMA GAME
        function update() {
            if (isGameOver) return;

            // Bersihkan Canvas tiap frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gambar Garis Tanah (Garis Horizontal)
            ctx.strokeStyle = "#4ecc71";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, 220);
            ctx.lineTo(canvas.width, 220);
            ctx.stroke();

            // --- LOGIKA & GRAFIK KARAKTER ---
            player.velocity += player.gravity;
            player.y += player.velocity;

            // Deteksi Batas Tanah
            if (player.y >= player.groundY) {
                player.y = player.groundY;
                player.velocity = 0;
                player.isJumping = false;
            }

            // ANTI-ALIASING DEMO: Karakter berupa lingkaran halus sub-pixel
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15; // Efek glow neon agar pinggiran halus makin terlihat
            ctx.shadowColor = player.color;
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0; // Reset efek glow untuk objek lain

            // --- LOGIKA & GRAFIK RINTANGAN (OBSTACLES) ---
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                
                // ELEMEN TRANSFORMATION: TRANSLASI (Geser dari kanan ke kiri)
                obs.x -= gameSpeed;

                // Gambar rintangan kotak
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                // DETEKSI TABRAKAN (Collision)
                if (player.x + player.radius - 5 > obs.x && 
                    player.x - player.radius + 5 < obs.x + obs.width && 
                    player.y + player.radius - 5 > obs.y) {
                    isGameOver = true;
                    ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#ffffff";
                    ctx.font = "30px Arial";
                    ctx.fillText("GAME OVER", canvas.width/2 - 90, canvas.height/2);
                    ctx.font = "16px Arial";
                    ctx.fillText("Tekan SPASI untuk mengulang", canvas.width/2 - 110, canvas.height/2 + 40);
                }

                // ELEMEN CLIPPING OTOMATIS: 
                // Jika rintangan telah keluar dari layar sebelah kiri (X < -width)
                // maka objek langsung dihapus dari array memori agar tidak bocor (memory leak).
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    score += 5;
                    scoreUI.innerText = score;
                    // Tingkatkan kecepatan perlahan agar menantang
                    gameSpeed += 0.1;
                }
            }

            // --- LOGIKA & GRAFIK KOIN ---
            for (let i = coins.length - 1; i >= 0; i--) {
                let coin = coins[i];
                
                // ELEMEN TRANSFORMATION: TRANSLASI (Bergerak mundur)
                coin.x -= gameSpeed;
                // ELEMEN TRANSFORMATION: ROTASI (Nilai sudut bertambah tiap frame)
                coin.angle += 0.05;

                // Proses Menggambar Grafika dengan Transformasi Lokal (Save & Restore)
                ctx.save();
                // 1. Translasi titik pusat (pivot) ke koordinat koin saat ini
                ctx.translate(coin.x, coin.y);
                // 2. Terapkan Rotasi Matematika berdasarkan poros sudutnya
                ctx.rotate(coin.angle);
                
                // ANTI-ALIASING DEMO: Menggambar koin lingkaran + kotak dekorasi di dalamnya
                ctx.beginPath();
                ctx.arc(0, 0, coin.radius, 0, Math.PI * 2);
                ctx.fillStyle = coin.color;
                ctx.fill();
                ctx.closePath();

                // Garis detail di dalam koin untuk membuktikan efek rotasi berputar
                ctx.fillStyle = "#162447";
                ctx.fillRect(-3, -8, 6, 16); 
                ctx.restore(); // Mengembalikan koordinat canvas ke normal

                // Deteksi ambil koin
                let distX = player.x - coin.x;
                let distY = player.y - coin.y;
                let distance = Math.sqrt(distX * distX + distY * distY);

                if (distance < player.radius + coin.radius) {
                    score += 15;
                    scoreUI.innerText = score;
                    coins.splice(i, 1); // Di-clip karena interaksi
                    continue;
                }

                // ELEMEN CLIPPING OTOMATIS (KOIN): Hapus jika lolos ke kiri layar
                if (coin.x + coin.radius < 0) {
                    coins.splice(i, 1);
                }
            }

            requestAnimationFrame(update);
        }

        // Jalankan game pertama kali
        update();
    </script>
</body>
</html>
